name: EUA — Análise Tarde

on:
  schedule:
    # 14:00h Lisboa (UTC+1 verão | UTC+0 inverno)
    # Verão  (Mar–Out): 13:00 UTC → 14:00 Lisboa  ← activo
    # Inverno (Out–Mar): mudar para '0 14 * * 1-5'
    # Mercado EUA abre às 14:30h Lisboa (verão) — dados do fecho anterior
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  us-scan:
    runs-on: ubuntu-latest
    env:
      MARKET: us

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Data Lisboa
        id: date
        run: echo "today=$(TZ='Europe/Lisbon' date +'%d/%m/%Y')" >> $GITHUB_OUTPUT

      - name: Correr screener americano
        run: node screener.mjs

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🇺🇸 Top 15 EUA — ${{ steps.date.outputs.today }}"
          to: joaommdc@gmail.com
          from: "Stock Analysis <${{ secrets.GMAIL_USERNAME }}>"
          html_body: file://report.html
