name: Europa — Análise Manhã

on:
  schedule:
    # 08:10h Lisboa (UTC+1 verão | UTC+0 inverno)
    # Verão  (Mar–Out): 07:10 UTC → 08:10 Lisboa  ← activo
    # Inverno (Out–Mar): mudar para '10 8 * * 1-5'
    - cron: '10 7 * * 1-5'
  workflow_dispatch:

jobs:
  europe-scan:
    runs-on: ubuntu-latest
    env:
      MARKET: europe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Data Lisboa
        id: date
        run: echo "today=$(TZ='Europe/Lisbon' date +'%d/%m/%Y')" >> $GITHUB_OUTPUT

      - name: Correr screener europeu
        run: node tv-screener-live.mjs eu

      - name: Enviar email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🇪🇺 Top 15 Europeias — ${{ steps.date.outputs.today }}"
          to: joaommdc@gmail.com
          from: "Stock Analysis <${{ secrets.GMAIL_USERNAME }}>"
          html_body: file://report.html
